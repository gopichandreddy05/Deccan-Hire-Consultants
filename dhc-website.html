  .mobile-grid-auto{grid-template-columns:1fr!important}

  h1{font-size:clamp(20px,5vw,32px)!important}
  h2{font-size:clamp(18px,4vw,26px)!important}
  h3{font-size:clamp(16px,3vw,20px)!important}
  
  /* Touch-friendly buttons */
  button{min-height:44px;min-width:44px;padding:12px 16px!important}
  
  /* Better spacing on mobile */
  nav{padding:14px 16px!important}
  
  /* Mobile-friendly forms */
  input,textarea,select{font-size:16px!important;padding:14px 12px!important}
  
  /* Image adjustments */
  img{max-width:100%;height:auto}
  
  /* Flex direction for mobile */
  .mobile-flex-col{flex-direction:column!important}
}

@media(max-width:640px){
  section{padding:32px 14px!important}
  
  h1{font-size:clamp(18px,6vw,28px)!important}
  h2{font-size:clamp(16px,4.5vw,22px)!important}
  
  /* Aggressive spacing for small phones */
  .mobile-sp-sm{gap:12px!important}
  
  /* Full width on small screens */
  button{width:100%!important;padding:14px!important}
  
  input[type="text"],input[type="email"],input[type="tel"],textarea,select{
    width:100%!important;padding:14px 10px!important;font-size:16px!important;
  }
  
  /* Card spacing */
  .card-mobile{padding:16px!important}
  
  /* Navbar height */
  nav{padding:12px 12px!important}
}

@media(max-width:480px){
  section{padding:24px 12px!important}
  
  h1{font-size:clamp(16px,7vw,24px)!important}
  h2{font-size:clamp(14px,5vw,18px)!important}
  h3{font-size:clamp(13px,4vw,16px)!important}
  
  p{font-size:clamp(13px,3vw,14px)!important}
  
  button{padding:12px 12px!important;font-size:13px!important}
  
  /* Stack everything on very small screens */
  .stack-mobile{flex-direction:column!important;gap:12px!important}
  
  /* Reduced icon sizes */
  .icon-mobile{font-size:24px!important}
}
</style>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:"20px"}}>
          {inds.map((ind,i)=>(
            <div key={i} style={{background:G.gray,borderRadius:"14px",padding:"28px 22px",border:"1px solid transparent",transition:"all 0.3s",cursor:"pointer"}} onMouseEnter={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor=G.green;e.currentTarget.style.boxShadow="0 8px 30px rgba(92,194,53,0.1)";e.currentTarget.style.transform="translateY(-4px)"}} onMouseLeave={e=>{e.currentTarget.style.background=G.gray;e.currentTarget.style.borderColor="transparent";e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="translateY(0)"}}>
              <div style={{fontSize:"36px",marginBottom:"14px"}}>{ind.icon}</div>
              <h3 style={{fontFamily:"Poppins",fontWeight:700,fontSize:"16px",color:G.dark,marginBottom:"10px"}}>{ind.t}</h3>
              <p style={{fontSize:"13px",color:G.textGray,lineHeight:1.7,marginBottom:"14px"}}>{ind.d}</p>
              <span style={{color:G.green,fontSize:"12px",fontWeight:600}}>Hire for this sector →</span>
            </div>
          ))}
        </div>
        <div style={{textAlign:"center",marginTop:"48px"}}>
          <p style={{fontSize:"15px",color:G.textGray,marginBottom:"20px"}}>Don't see your industry? We recruit for any technology-driven sector.</p>
          <button onClick={()=>go("contact")} style={{padding:"12px 32px",borderRadius:"25px",background:G.green,color:"#fff",fontSize:"14px",fontWeight:700,border:"none"}}>Discuss Your Industry Needs →</button>
        </div>
      </div>
    </section>
  </div>
  );
};

// CONTACT
const Contact=()=>{
  const [form,setForm]=useState({name:"",email:"",phone:"",service:"",message:""});
  const [status,setStatus]=useState("idle");
  const [errors,setErrors]=useState({});
  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name="Full name is required";
    if(!form.email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email))e.email="Valid email required";
    if(!form.phone||form.phone.replace(/\D/g,"").length<10)e.phone="Valid phone number required";
    if(!form.service)e.service="Please select a service";
    if(!form.message||form.message.length<10)e.message="Please describe your requirements";
    return e;
  };
  const submit=async()=>{
    const e=validate();if(Object.keys(e).length){setErrors(e);return;}
    setErrors({});setStatus("loading");
    await new Promise(r=>setTimeout(r,1500));
    setStatus("success");setForm({name:"",email:"",phone:"",service:"",message:""});
  };
  const inp=(f,ph,ty="text")=>({
    value:form[f],onChange:e=>setForm(p=>({...p,[f]:e.target.value})),placeholder:ph,type:ty,
    style:{width:"100%",padding:"12px 14px",borderRadius:"9px",fontSize:"14px",border:`1.5px solid ${errors[f]?"#e53e3e":G.border}`,background:"#fff",color:"#1a202c",fontFamily:"Manrope,sans-serif",outline:"none"},
    onFocus:e=>e.target.style.borderColor=G.green,onBlur:e=>e.target.style.borderColor=errors[f]?"#e53e3e":G.border
  });
  return(
  <div className="page">
    <section style={{background:`linear-gradient(135deg,${G.dark},#1a5c3a)`,padding:"clamp(60px,10vw,110px) 24px clamp(48px,8vw,64px)",textAlign:"center"}}>
      <span style={{display:"inline-block",background:"rgba(92,194,53,0.2)",color:G.green,padding:"5px 14px",borderRadius:"20px",fontSize:"11px",fontWeight:700,letterSpacing:"1px",marginBottom:"16px"}}>CONTACT US</span>
      <h1 style={{fontFamily:"Poppins",fontWeight:800,fontSize:"clamp(28px,5vw,46px)",color:"#fff",marginBottom:"16px"}}>Connect With Our Recruitment Team</h1>
      <p style={{fontSize:"clamp(14px,3vw,16px)",color:"rgba(255,255,255,0.8)",lineHeight:1.7,maxWidth:"620px",margin:"0 auto"}}>Ready to hire or need recruitment support? Our team responds within 24 hours on business days.</p>
    </section>
    <section style={{padding:"64px 24px",background:G.gray}}>
      <div style={{maxWidth:"1060px",margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:"36px",alignItems:"start"}}>
        <div>
          <h2 style={{fontFamily:"Poppins",fontWeight:700,fontSize:"20px",color:G.dark,marginBottom:"6px"}}>Get In Touch</h2>
          <p style={{color:G.textGray,fontSize:"13px",lineHeight:1.7,marginBottom:"24px"}}>Mon–Sat, 9 AM – 7 PM IST. Urgent? Call us directly.</p>
          {[{icon:"📞",l:"Primary",v:"+91 78158 06889",h:"tel:+917815806889"},{icon:"📞",l:"Secondary",v:"+91 96661 26451",h:"tel:+919666126451"},{icon:"✉️",l:"Email",v:"deccanhireconsultants@gmail.com",h:"mailto:deccanhireconsultants@gmail.com"},{icon:"📍",l:"Location",v:"Hyderabad, Telangana, India",h:"#"}].map((item,i)=>(
            <a key={i} href={item.h} style={{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"16px",textDecoration:"none",color:"inherit"}}>
              <div style={{width:"38px",height:"38px",borderRadius:"10px",background:G.light,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"16px"}}>{item.icon}</div>
              <div>
                <div style={{fontSize:"10px",fontWeight:700,color:G.textGray,textTransform:"uppercase",letterSpacing:"1px",marginBottom:"2px"}}>{item.l}</div>
                <div style={{fontSize:"13px",color:G.dark,fontWeight:600,lineHeight:1.4,wordBreak:"break-all"}}>{item.v}</div>
              </div>
            </a>
          ))}
          <a href="https://wa.me/917815806889" target="_blank" style={{display:"flex",gap:"8px",alignItems:"center",padding:"12px 18px",borderRadius:"10px",background:"#25D366",color:"#fff",fontWeight:700,fontSize:"13px",marginTop:"8px",textDecoration:"none"}}>
            <span style={{fontSize:"18px"}}>💬</span> Chat on WhatsApp
          </a>
          <div style={{marginTop:"20px",padding:"14px",borderRadius:"10px",background:G.light,border:`1px solid ${G.mint}`}}>
            <div style={{fontSize:"11px",fontWeight:700,color:G.dark,marginBottom:"3px"}}>⚡ Response Time</div>
            <div style={{fontSize:"12px",color:G.textGray}}>We respond within <strong>24 hours</strong> on business days. Call us for urgent requests.</div>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:"18px",padding:"32px",boxShadow:"0 8px 40px rgba(0,0,0,0.06)",border:`1px solid ${G.border}`}}>
          {status==="success"?(
            <div style={{textAlign:"center",padding:"32px 16px"}}>
              <div style={{fontSize:"56px",marginBottom:"20px"}}>✅</div>
              <h3 style={{fontFamily:"Poppins",fontWeight:700,fontSize:"20px",color:G.dark,marginBottom:"10px"}}>Message Sent!</h3>
              <p style={{color:G.textGray,fontSize:"14px",lineHeight:1.7}}>Thank you. Our recruitment team will contact you shortly.</p>
              <button onClick={()=>setStatus("idle")} style={{marginTop:"20px",padding:"11px 24px",borderRadius:"22px",background:G.green,color:"#fff",fontWeight:700,border:"none",fontSize:"13px"}}>Send Another Message</button>
            </div>
          ):(
            <>
              <h3 style={{fontFamily:"Poppins",fontWeight:700,fontSize:"18px",color:G.dark,marginBottom:"6px"}}>Request Recruitment Support</h3>
              <p style={{color:G.textGray,fontSize:"12px",marginBottom:"24px"}}>Fill in your details and we'll craft a tailored recruitment strategy for you.</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"12px",marginBottom:"12px"}}>
                <div><input {...inp("name","Full Name *")}/>{errors.name&&<div style={{color:"#e53e3e",fontSize:"11px",marginTop:"3px"}}>{errors.name}</div>}</div>
                <div><input {...inp("email","Email Address *","email")}/>{errors.email&&<div style={{color:"#e53e3e",fontSize:"11px",marginTop:"3px"}}>{errors.email}</div>}</div>
              </div>
              <div style={{marginBottom:"12px"}}><input {...inp("phone","Mobile Number *","tel")}/>{errors.phone&&<div style={{color:"#e53e3e",fontSize:"11px",marginTop:"3px"}}>{errors.phone}</div>}</div>
              <div style={{marginBottom:"12px"}}>
                <select value={form.service} onChange={e=>setForm(p=>({...p,service:e.target.value}))} style={{width:"100%",padding:"12px 14px",borderRadius:"9px",fontSize:"14px",border:`1.5px solid ${errors.service?"#e53e3e":G.border}`,background:"#fff",color:form.service?"#1a202c":"#718096",fontFamily:"Manrope,sans-serif",outline:"none"}} onFocus={e=>e.target.style.borderColor=G.green} onBlur={e=>e.target.style.borderColor=errors.service?"#e53e3e":G.border}>
                  <option value="">Select Service Required *</option>
                  {["IT Recruitment Services","Permanent Staffing","Contract Staffing","Bulk Hiring Solutions","Candidate Screening & Evaluation","Recruitment Consultation","Other"].map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                {errors.service&&<div style={{color:"#e53e3e",fontSize:"11px",marginTop:"3px"}}>{errors.service}</div>}
              </div>
              <div style={{marginBottom:"20px"}}>
                <textarea value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} placeholder="Your message or hiring requirements *" rows={4} style={{width:"100%",padding:"12px 14px",borderRadius:"9px",fontSize:"14px",border:`1.5px solid ${errors.message?"#e53e3e":G.border}`,background:"#fff",color:"#1a202c",fontFamily:"Manrope,sans-serif",outline:"none",resize:"vertical"}} onFocus={e=>e.target.style.borderColor=G.green} onBlur={e=>e.target.style.borderColor=errors.message?"#e53e3e":G.border}/>
                {errors.message&&<div style={{color:"#e53e3e",fontSize:"11px",marginTop:"3px"}}>{errors.message}</div>}
              </div>
              <button onClick={submit} disabled={status==="loading"} style={{width:"100%",padding:"14px",borderRadius:"10px",background:status==="loading"?G.textGray:G.green,color:"#fff",fontSize:"15px",fontWeight:700,border:"none",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",cursor:status==="loading"?"not-allowed":"pointer"}}>
                {status==="loading"?<><span style={{width:"16px",height:"16px",border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block"}}/>Sending...</>:"Send Message →"}
              </button>
              <p style={{textAlign:"center",marginTop:"10px",fontSize:"11px",color:G.textGray}}>🔒 Your information is secure and will never be shared.</p>
            </>
          )}
        </div>
      </div>
    </section>
    <section style={{padding:"40px 24px",background:G.dark}}>
      <div style={{maxWidth:"1100px",margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"20px"}}>
        {[{icon:"⏰",t:"Business Hours",v:"Mon–Sat: 9 AM – 7 PM IST"},{icon:"📍",t:"Location",v:"Hyderabad, Telangana, India"},{icon:"⚡",t:"Response Time",v:"Within 24 business hours"},{icon:"🌐",t:"Markets",v:"Hyderabad & Global"}].map(({icon,t,v})=>(
          <div key={t} style={{textAlign:"center",padding:"16px"}}>
            <div style={{fontSize:"26px",marginBottom:"6px"}}>{icon}</div>
            <div style={{fontFamily:"Poppins",fontWeight:600,color:G.green,marginBottom:"3px",fontSize:"12px"}}>{t}</div>
            <div style={{color:"rgba(255,255,255,0.8)",fontSize:"12px"}}>{v}</div>
          </div>
        ))}
      </div>
    </section>
  </div>
  );
};

function App(){
  const [page,setPage]=useState("home");
  const go=useCallback((p)=>{window.scrollTo({top:0,behavior:"smooth"});setTimeout(()=>setPage(p),80)},[]);
  const Pages={home:Home,about:About,services:Services,industries:Industries,contact:Contact};
  const Page=Pages[page]||Home;
  return(
    <>
      <Navbar page={page} go={go}/>
      <main style={{paddingTop:0,minHeight:"100vh"}}><Page go={go}/></main>
      <Footer go={go}/>
      <Float/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
